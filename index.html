<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>DREVORA</title>
    <meta
      name="description"
      content="Fleet and workforce management platform for modern transport businesses."
    />
    <meta name="theme-color" content="#2563EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DREVORA" />
    <!--
      Critical first-paint containment for installed PWA / mobile Safari.
      Applies before the main CSS bundle so the shell cannot briefly layout
      wider than the device width on cold launch.
    -->
    <style>
      /* Border-box must apply before the main CSS bundle — otherwise w-full +
         horizontal padding on Worker main can briefly exceed the viewport and
         clip the Home header on iOS PWA cold launch. */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html {
        width: 100%;
        max-width: 100%;
        overflow-x: clip;
      }
      body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: clip;
      }
      #root {
        width: 100%;
        max-width: 100%;
        min-width: 0;
        overflow-x: clip;
      }
      img:not(.drevora-brand-logo),
      svg,
      video,
      canvas {
        max-width: 100%;
      }
      img.drevora-brand-logo {
        max-width: none;
        flex-shrink: 0;
      }
    </style>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
